---
# role-rhel10-upgrader/tasks/preflight.yml

- name: Verify system is RHEL
  ansible.builtin.assert:
    that: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution'] == "RedHat"
    success_msg: "System is running RHEL, proceeding with preflight checks."
    fail_msg: "This role is intended for RHEL systems only. Detected OS: {{ ansible_facts['distribution'] }}"

- name: Verify system is RHEL 9
  ansible.builtin.assert:
    that: ansible_facts['distribution_major_version'] == "9"
    success_msg: "System is running RHEL 9, proceeding with preflight checks."
    fail_msg: "This role is intended for RHEL 9 systems only. Detected major version: {{ ansible_facts['distribution_major_version'] }}" 

- name: Verify system is x86_64 architecture
  ansible.builtin.assert:
    that: ansible_facts['architecture'] == "x86_64"
    success_msg: "System is running on x86_64 architecture, proceeding with preflight checks."
    fail_msg: "This role is intended for x86_64 architecture only. Detected architecture: {{ ansible_facts['architecture'] }}"

- name: Get CPU flags from /proc/cpuinfo
  ansible.builtin.shell: "grep -m1 '^flags' /proc/cpuinfo | cut -d: -f2"
  register: cpu_flags_raw
  changed_when: false

- name: Verify CPU has avx2 flags to support RHEL 10
  ansible.builtin.assert:
    that: "'avx2' in cpu_flags_raw.stdout.split()"
    success_msg: "System has AVX2 support, proceeding with preflight checks."
    fail_msg: "The CPU must support AVX2 instructions to upgrade to RHEL 10. Detected CPU flags: {{ cpu_flags_raw.stdout }}"

# STRATEGY: Handle environments where specific partitions aren't separate mounts (e.g., Containers).
# 1. Look for the specific mount (e.g., /boot or /var/lib/leapp).
# 2. Use the '+' operator to join it with the root ('/') mount as a fallback.
# 3. If the first list is empty, 'first' will safely grab the root partition details.
# 4. This prevents "No first item, sequence was empty" errors.

- name: Verify system has enough /boot space for the upgrade
  vars:
    # Prioritize /boot partition if it exists; otherwise, check /
    boot_partition: >-
      {{ (ansible_facts['mounts'] | selectattr('mount', 'equalto', '/boot') | list + 
          ansible_facts['mounts'] | selectattr('mount', 'equalto', '/') | list) | first }}
  ansible.builtin.assert:
    that: 
      - boot_partition.size_available > 500000000
    success_msg: "Enough space found on {{ boot_partition.mount }} for /boot."
    fail_msg: "Insufficient space on {{ boot_partition.mount }}. Need at least 500MB."

- name: Verify system has enough space for leapp data
  vars:
    # Checks /var/lib/leapp, then /var (common partition), then /
    leapp_partition: >-
      {{ (ansible_facts['mounts'] | selectattr('mount', 'equalto', '/var/lib/leapp') | list +
          ansible_facts['mounts'] | selectattr('mount', 'equalto', '/var') | list +
          ansible_facts['mounts'] | selectattr('mount', 'equalto', '/') | list) | first }}
  ansible.builtin.assert:
    that: 
      - leapp_partition.size_available > 5000000000
    success_msg: "Enough space found on {{ leapp_partition.mount }} for leapp data."
    fail_msg: "The partition {{ leapp_partition.mount }} needs at least 5GB of free space."

