---
- name: Playbook to configure AAP post installation (Leapp-O-Matic Edition)
  hosts: localhost
  connection: local
  vars:
    # Lógica de cálculo con nombres únicos (aap_) para evitar recursividad
    # El default(controller_hostname) tomará el valor del fichero vars.yml (vía -e)
    aap_hostname: "{{ vault_controller_hostname | default(lookup('env', 'CONTROLLER_HOST')) | default(controller_hostname) }}"
    aap_username: "{{ vault_controller_username | default(lookup('env', 'CONTROLLER_USERNAME')) | default(controller_username) }}"
    aap_password: "{{ vault_controller_password | default(lookup('env', 'CONTROLLER_PASSWORD')) | default(controller_admin_password) }}"
    aap_validate_certs: "{{ (vault_controller_validate_certs | default(lookup('env', 'CONTROLLER_VERIFY_SSL')) | default(false)) | bool }}"

    # Asegura que espere a que el objeto esté listo antes de seguir
    controller_workflow_wait: true
  pre_tasks:
    # Puente de compatibilidad: Mapeamos los resultados a los nombres que el rol 'infra'
    # y las tareas asíncronas buscan internamente para evitar el error de 127.0.0.1
    - name: "AAP 2.6 | Bridge calculated vars to role expected vars"
      ansible.builtin.set_fact:
        controller_hostname: "{{ aap_hostname }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ aap_password }}"
        controller_validate_certs: "{{ aap_validate_certs }}"

    - name: Include vars from platform_configuration directory
      ansible.builtin.include_vars:
        dir: ./platform_configuration/
        ignore_files: [controller_config.yml.template]
        extensions: ["yml"]

  roles:
    - infra.aap_configuration.dispatch