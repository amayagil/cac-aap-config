---
- name: Playbook to configure AAP post installation (Leapp-O-Matic Edition)
  hosts: localhost
  connection: local
  vars:
    aap_hostname: "{{ caap_fqdn | default(vault_controller_hostname, true) | default(lookup('env', 'CONTROLLER_HOST'), true) | mandatory }}"
    aap_username: "{{ vault_controller_username | default(lookup('env', 'CONTROLLER_USERNAME'), true) | default(controller_username, true) | default('admin', true)
      }}"
    aap_password: "{{ vault_controller_admin_password | default(vault_controller_password, true) | default(lookup('env', 'CONTROLLER_PASSWORD'), true) | default(controller_admin_password,
      true) | mandatory }}"
    aap_validate_certs: false

  pre_tasks:
    # Before include_vars: platform YAML may template this name.
    - name: Controller organization for controller-scoped CaC objects
      ansible.builtin.set_fact:
        cac_controller_organization: "{{ cac_controller_organization | default('Default') }}"

    - name: Include vars from platform_configuration directory
      ansible.builtin.include_vars:
        dir: ./platform_configuration/
        ignore_files: [controller_config.yml.template]
        extensions: ["yml"]

    - name: "AAP 2.6 | Bridge calculated vars"
      ansible.builtin.set_fact:
        gateway_host: "{{ aap_hostname }}"
        gateway_hostname: "{{ aap_hostname }}"
        gateway_username: "{{ aap_username }}"
        gateway_password: "{{ aap_password }}"
        gateway_validate_certs: "{{ aap_validate_certs }}"
        controller_hostname: "{{ aap_hostname }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ aap_password }}"
        controller_validate_certs: "{{ aap_validate_certs }}"

  roles:
    - infra.aap_configuration.dispatch
