---
controller_workflows:
  - name: "WORKFLOW: Leapp-O-Matic RHEL 10 Migration"
    organization: "Default"
    destroy_current_nodes: true
    ask_limit_on_launch: true
    survey_enabled: true
    survey_spec:
      name: "Host Selection"
      description: "Select the target hosts for the RHEL 10 migration"
      spec:
        - question_name: "Target Hosts"
          question_description: "Select one or more hosts to upgrade"
          required: true
          type: multiselect
          variable: limit
          choices: |
            gazpacho
            torrezno
            target1
            sporcizia
            spazzina
            fancazzista
          default: ""
    workflow_nodes:
      - identifier: "node_preflight"
        unified_job_template:
          name: "Leapp: 01 - Preflight"
          type: job_template
          organization:
            name: "Default"
        related:
          success_nodes:
            - identifier: "node_rhsm"
          failure_nodes: []
          always_nodes: []

      - identifier: "node_rhsm"
        unified_job_template:
          name: "Leapp: 02 - RHSM Registration"
          type: job_template
          organization:
            name: "Default"
        related:
          success_nodes:
            - identifier: "node_insights"
          failure_nodes: []
          always_nodes: []

      - identifier: "node_insights"
        unified_job_template:
          name: "Leapp: 03 - Insights Registration"
          type: job_template
          organization:
            name: "Default"
        related:
          success_nodes:
            - identifier: "node_upgrade"
          failure_nodes: []
          always_nodes: []

      - identifier: "node_upgrade"
        unified_job_template:
          name: "Leapp: 04 - Upgrade Execution"
          type: job_template
          organization:
            name: "Default"
        related:
          success_nodes:
            - identifier: "node_post_upgrade"
          failure_nodes: []
          always_nodes: []

      - identifier: "node_post_upgrade"
        unified_job_template:
          name: "Leapp: 05 - Post-Upgrade Verification"
          type: job_template
          organization:
            name: "Default"
        related:
          success_nodes: []
          failure_nodes: []
          always_nodes: []
