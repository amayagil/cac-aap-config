---
controller_credentials:
  - name: controller
    description: Automation Controller
    organization: Default
    credential_type: Red Hat Ansible Automation Platform
    inputs:
      username: admin
      password: "{{ controller_admin_password }}"
      host: "{{ caap_fqdn }}"

  - name: pah
    description: Private Automation Hub
    organization: Default
    credential_type: Container Registry
    inputs:
      host: "{{ caap_fqdn }}"
      username: admin
      password: "{{ controller_admin_password }}"
      verify_ssl: false

  - name: quay
    description: Quay registry
    organization: Default
    credential_type: Container Registry
    inputs:
      host: quay.io
      username: "{{ quay_registry_username | default(omit) }}"
      password: "{{ quay_registry_password | default(omit) }}"

  - name: "GitLab Amaya Pass"
    organization: "Default"
    credential_type: "Source Control"
    inputs:
      username: "{{ gitlab_username }}"
      password: "{{ vault_gitlab_token }}"

  - name: "GitHub Amaya Token"
    organization: "Default"
    credential_type: "Source Control"
    inputs:
      username: "{{ github_username }}"
      password: "{{ vault_github_token }}"

  - name: "NUC Machine Credential"
    organization: "Default"
    credential_type: "Machine"
    inputs:
      username: "{{ machine_username }}"
      ssh_key_data: "{{ vault_ssh_key_private }}"

