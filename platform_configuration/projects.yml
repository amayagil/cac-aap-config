---
controller_projects:
  - name: "CaC - Configuración de Plataforma"
    organization: "{{ aap_organization }}"
    scm_type: git
    scm_url: "https://github.com/amayagil/cac-aap-config.git"
    scm_branch: main
    scm_credential: "GitHub Token-{{ aap_organization }}"
    scm_verify_ssl: false
    scm_update_on_launch: true
    wait: true

  - name: "Role: RHSM Registration"
    organization: "{{ aap_organization }}"
    scm_type: git
    scm_url: "https://gitlab.com/ansible-ssa/role-rhsm-registration.git"
    scm_credential: "GitLab Pass-{{ aap_organization }}"
    scm_verify_ssl: false

  - name: "Role: Insights Registration"
    organization: "{{ aap_organization }}"
    scm_type: git
    scm_url: "https://gitlab.com/ansible-ssa/role-insights-registration.git"
    scm_credential: "GitLab Pass-{{ aap_organization }}"
    scm_verify_ssl: false

  - name: "Role: RHEL 10 Upgrader"
    organization: "{{ aap_organization }}"
    scm_type: git
    scm_url: "https://gitlab.com/ansible-ssa/role-rhel10-upgrader"
    scm_credential: "GitLab Pass-{{ aap_organization }}"
    scm_verify_ssl: false